name: CI
on:
  push:
    branches: [main]      # only after merge to main (populates SonarCloud main dashboard)
  pull_request:           # feature branches run here -> no duplicate with push
  workflow_dispatch:      # manual trigger

concurrency:
  # A newer push to the same ref cancels the in-flight run instead of stacking.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Day 24: GITHUB_TOKEN needs `packages: write` so build-image can push to GHCR.
# Repo-level UI toggle (Settings → Actions → Workflow permissions = Read and write)
# must also be ON — both layers must agree per defense-in-depth design.
permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    # Day 26: runs in parallel with lint/build. Produces the coverage report
    # that the `sonar` job consumes — sonar gates on this via `needs: [test]`.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test          # vitest run --coverage -> coverage/lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build:
    runs-on: ubuntu-latest
    # Day 24 change: removed `needs: lint` so build runs in parallel with lint.
    # Day 23 had needs: lint (sequential). build-image (added in Q3) will gate on both.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  build-image:
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        # QEMU emulator required for multi-arch builds on ubuntu-latest (amd64 host).
        # Without it, building linux/arm64 from amd64 runner fails with `exec format error`.
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # Multi-arch per CLAUDE.md: M1 host needs arm64 image to run locally;
          # kind on ubuntu-latest runner needs amd64. Same digest covers both.
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - uses: actions/checkout@v4

      - name: Create ephemeral kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ci-${{ github.run_id }}
          wait: 120s

      - name: Create imagePullSecret for private GHCR
        # Must run BEFORE kubectl apply — manifest references this secret by name.
        # If reversed, kubectl accepts the manifest (just a string ref) but Pods
        # land in ImagePullBackOff because kubelet has no creds for ghcr.io.
        run: |
          kubectl create secret docker-registry ghcr-creds \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }}

      - name: Substitute placeholder image tag with current SHA
        # Edits the runner's ephemeral copy of deployment.yaml only — the file
        # in git stays at `:placeholder`. Each run computes its own SHA fresh.
        run: |
          sed -i "s|image: ghcr.io/proops2026-task-management/frontend-service:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|" k8s/deployment.yaml
          echo "--- modified k8s/deployment.yaml ---"
          cat k8s/deployment.yaml

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/

      - name: Wait for rollout
        # THE deploy gate. Without this, deploy "passes" the moment kubectl
        # accepts the YAML — false positive when Pods crash. Block until all
        # new-revision Pods are Ready or fail after 180s.
        run: |
          kubectl rollout status deployment/frontend-service --timeout=180s

      - name: Show running image + debug (mentor evidence)
        # `if: always()` — run even when the previous step (rollout) failed,
        # so we get Pod state in the log instead of being blind on failure.
        if: always()
        run: |
          echo "=== pods ==="
          kubectl get pods -o wide -l app=frontend-service || true
          echo ""
          echo "=== describe (full) ==="
          kubectl describe pod -l app=frontend-service || true
          echo ""
          echo "=== services ==="
          kubectl get svc -l app=frontend-service || true
          echo ""
          echo "=== events (last 30, chronological) ==="
          kubectl get events --sort-by='.lastTimestamp' | tail -30 || true
          echo ""
          echo "=== container logs (current + previous, if any) ==="
          for pod in $(kubectl get pods -l app=frontend-service -o name 2>/dev/null); do
            echo "--- $pod (current) ---"
            kubectl logs "$pod" --tail=80 --all-containers=true || true
            echo "--- $pod (previous, if any) ---"
            kubectl logs "$pod" --tail=80 --all-containers=true --previous 2>/dev/null || true
          done

  sonar:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so SonarCloud can diff against the base branch and
          # compute "new code". Default depth-1 silently breaks new-code detection.
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          # The coverage report the `test` job uploaded. Without this,
          # SonarCloud reports 0% coverage even though tests produced it.
          name: coverage
          path: coverage/
      - name: SonarCloud Scan
        # Current maintained action (replaces deprecated sonarcloud-github-action).
        # Reads sonar-project.properties from the repo root automatically.
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
