name: CI
on: [push, pull_request, workflow_dispatch]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    # Day 24 change: removed `needs: lint` so build runs in parallel with lint.
    # Day 23 had needs: lint (sequential). build-image (added in Q3) will gate on both.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  verify-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret loaded + masked in logs
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "Secret length: ${#DOCKERHUB_TOKEN}"
          echo "Secret value (should be masked): $DOCKERHUB_TOKEN"
