name: Deploy Production (manual)

# Separate file from deploy-staging.yml on purpose: easier to audit ("who deployed
# prod last month" = filter Actions by this workflow), easier to add prod-only checks,
# and harder to misclick than one workflow with an env dropdown. Promotes an already-
# built image — never rebuilds. Same SHA that passed staging.
on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Commit SHA to promote to PRODUCTION (verify it has passed staging)"
        type: string
        required: true

jobs:
  deploy:
    uses: proops-task-management/cicd-platform/.github/workflows/reusable-deploy.yml@v3
    with:
      image-tag: ${{ inputs.image-tag }}
      environment: prod
      project-name: "proops-task-management"
      service-name: "frontend-service"
    secrets:
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
