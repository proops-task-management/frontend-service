name: IaC PR Open — Plan
# Thin caller: PR touching iac/** → terraform plan (read-only preview).
on:
  pull_request:
    branches: [main]
    paths: ['iac/**']
    types: [opened, synchronize]

jobs:
  iac-plan:
    uses: proops-task-management/cicd-platform/.github/workflows/reusable-iac.yml@v1
    with:
      action: plan
      environment: dev
      working-directory: iac/dev
      aws-region: ap-southeast-1
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
