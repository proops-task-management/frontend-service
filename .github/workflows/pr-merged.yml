name: PR Merged — App CI + Push
# Thin caller: push to main (PR merged) → delegate to the platform's reusable workflow.
# push-image:true → build + test + push multi-arch image to GHCR (tagged with commit SHA).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'iac/**'
      - '**/Jenkinsfile'

jobs:
  app-ci:
    uses: proops-task-management/cicd-platform/.github/workflows/reusable-app-ci.yml@v2
    with:
      runtime-version: "20"
      image-tag: ${{ github.sha }}
      push-image: true
      enable-sonar: true
    secrets:
      # GHCR still uses the auto GITHUB_TOKEN + github.actor via fallback defaults.
      # SONAR_TOKEN is forwarded for the sonar job's quality gate.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
