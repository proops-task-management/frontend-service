name: Merge → Build + Deploy Dev

# Thin caller (build once, auto-deploy dev). Push to main →
#   job 1 build:       reusable-build.yml builds + pushes a ghcr image tagged by
#                      the commit SHA, runs the SonarCloud main-branch gate, and
#                      outputs that SHA as image-tag.
#   job 2 deploy-dev:  needs build, promotes needs.build.outputs.image-tag to dev.
# Staging and prod are promoted MANUALLY (deploy-staging.yml / deploy-prod.yml)
# using the SHA printed in this run's summary — that manual click is the gate.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'iac/**'
      - '**/Jenkinsfile'

jobs:
  build:
    uses: proops-task-management/cicd-platform/.github/workflows/reusable-build.yml@v3
    with:
      runtime-version: "20"
      project-name: "proops-task-management"
      service-name: "frontend-service"
      enable-sonar: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-dev:
    needs: build
    uses: proops-task-management/cicd-platform/.github/workflows/reusable-deploy.yml@v3
    with:
      # Reads the SHA the build job exported (the output→input handoff).
      image-tag: ${{ needs.build.outputs.image-tag }}
      environment: dev
      project-name: "proops-task-management"
      service-name: "frontend-service"
    secrets:
      # Optional for kind-in-CI; passing it demonstrates env-scoped secret wiring.
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
