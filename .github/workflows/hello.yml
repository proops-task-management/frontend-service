name: Hello
on: [push, workflow_dispatch]
jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print context
        run: |
          echo "Triggered by: $GITHUB_ACTOR"
          echo "Branch:       $GITHUB_REF_NAME"
          echo "Commit:       $GITHUB_SHA"
          echo "Repo:         $GITHUB_REPOSITORY"
          echo "Project:      frontend-service (proops2026-task-management)"
          echo "Day:          23 — GitHub Actions foundations"
          echo "Trainee:      minh_dt"
