name: CI
on: [push, workflow_dispatch]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: |
          echo "Linting at $(date)"
          sleep 10
          echo "Lint done"

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: |
          echo "Testing at $(date)"
          sleep 10
          echo "Test done"
