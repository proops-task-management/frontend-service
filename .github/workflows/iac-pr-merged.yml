name: IaC PR Merged — Apply
# Thin caller: push to main touching iac/** → terraform apply (real AWS change).
on:
  push:
    branches: [main]
    paths: ['iac/**']

jobs:
  iac-apply:
    uses: proops-task-management/cicd-platform/.github/workflows/reusable-iac.yml@v1
    with:
      action: apply
      environment: dev
      working-directory: iac/dev
      aws-region: ap-southeast-1
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
