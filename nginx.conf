server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: /api/* → API Gateway
    # COMMENTED OUT for Day 24 standalone deploy.
    # nginx 1.x resolves hostnames in `proxy_pass` at startup time. Without an
    # `api-gateway` Service in the cluster, the resolve fails with
    # `[emerg] host not found in upstream "api-gateway"` and nginx exits →
    # CrashLoopBackOff. Re-enable when api-gateway Service is deployed (Day 25+).
    # location /api/ {
    #     proxy_pass http://api-gateway:8080/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Serve static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes → index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable directory listing
    autoindex off;
}
