server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CoreDNS in k8s cluster; defers DNS lookups inside this server block
    # to per-request, so nginx starts cleanly even when upstream Services
    # like api-gateway are absent. valid=30s caches resolution; ipv6=off
    # avoids waiting on AAAA lookups in cluster-internal traffic.
    resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;

    # Reverse proxy: /api/* → API Gateway (late-bind via variable)
    # Variable forces per-request resolution, not startup resolution.
    # If api-gateway Service missing → /api/ requests return 502 (graceful);
    # nginx itself starts fine and continues serving / + /assets/.
    location /api/ {
        set $api_gateway "api-gateway:8080";
        proxy_pass http://$api_gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes → index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable directory listing
    autoindex off;
}
