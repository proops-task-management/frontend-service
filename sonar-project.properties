# SonarCloud project config — Day 26
# Read automatically by the scan action from the repo root.

sonar.projectKey=proops-task-management_frontend-service
sonar.organization=proops-task-management

# Source + test layout (TS/React). Both live under src/; test.inclusions
# tells the scanner which files are tests vs production sources.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Never analyze deps, build output, or the coverage dir.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

# Coverage report produced by the `test` job (vitest v8 -> lcov).
# Wrong path here is the #1 cause of "0% coverage" despite passing tests.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclude test files + non-logic entrypoints from the coverage denominator.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,src/main.tsx,src/vite-env.d.ts
